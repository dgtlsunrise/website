<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1612;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0d0a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b87320;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0a040;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid texture -->
  <g opacity="0.04" stroke="#f0e8d8" stroke-width="0.5">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Amber accent bar left -->
  <rect x="0" y="0" width="6" height="630" fill="url(#amberGrad)"/>

  <!-- Simplified US map outline - right side, large, muted -->
  <g opacity="0.08" fill="none" stroke="#f0e8d8" stroke-width="1.5" transform="translate(480, 60) scale(1.1)">
    <!-- Rough continental US outline -->
    <path d="M 80,20 L 200,15 L 260,30 L 300,20 L 340,35 L 370,25 L 420,40 L 450,35 L 480,50 L 500,45 L 510,60 L 490,80 L 500,100 L 480,120 L 460,140 L 430,155 L 400,160 L 370,175 L 340,190 L 310,200 L 280,210 L 250,215 L 220,225 L 200,240 L 180,260 L 160,270 L 140,260 L 120,245 L 100,230 L 80,215 L 65,195 L 55,170 L 50,145 L 45,120 L 50,95 L 55,70 L 65,45 L 80,20 Z"/>
    <!-- Florida peninsula -->
    <path d="M 400,160 L 420,185 L 430,210 L 420,240 L 405,260 L 390,250 L 385,230 L 390,210 L 400,190 L 400,160 Z"/>
    <!-- Great Lakes rough -->
    <ellipse cx="310" cy="80" rx="25" ry="12" fill="#f0e8d8" opacity="0.3"/>
    <ellipse cx="350" cy="70" rx="15" ry="8" fill="#f0e8d8" opacity="0.3"/>
  </g>

  <!-- Target city dots with connecting lines -->
  <!-- Huntsville AL -->
  <circle cx="810" cy="310" r="5" fill="#b87320" opacity="0.6" filter="url(#glow)"/>
  <circle cx="810" cy="310" r="12" fill="none" stroke="#b87320" stroke-width="1" opacity="0.3"/>
  <!-- DC/NoVA -->
  <circle cx="890" cy="255" r="5" fill="#b87320" opacity="0.6" filter="url(#glow)"/>
  <circle cx="890" cy="255" r="12" fill="none" stroke="#b87320" stroke-width="1" opacity="0.3"/>
  <!-- Dayton OH -->
  <circle cx="845" cy="248" r="5" fill="#b87320" opacity="0.5" filter="url(#glow)"/>
  <!-- Coeur d'Alene -->
  <circle cx="655" cy="195" r="5" fill="#f0e8d8" opacity="0.4"/>
  <circle cx="655" cy="195" r="12" fill="none" stroke="#f0e8d8" stroke-width="1" opacity="0.2"/>

  <!-- Faint connecting lines from CDA to targets -->
  <line x1="655" y1="195" x2="810" y2="310" stroke="#b87320" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
  <line x1="655" y1="195" x2="890" y2="255" stroke="#b87320" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>
  <line x1="655" y1="195" x2="845" y2="248" stroke="#b87320" stroke-width="1" stroke-dasharray="4,4" opacity="0.2"/>

  <!-- Amber glow behind title area -->
  <ellipse cx="340" cy="315" rx="280" ry="180" fill="#b87320" opacity="0.04"/>

  <!-- Amber rule top -->
  <rect x="60" y="100" width="500" height="2" fill="url(#amberGrad)" opacity="0.8"/>

  <!-- Eyebrow label -->
  <text x="60" y="88" font-family="Georgia, serif" font-size="13" fill="#b87320" letter-spacing="4" opacity="0.9">APRIL 2026  ·  NOEL CHURCHILL</text>

  <!-- Main title -->
  <text x="60" y="200" font-family="Georgia, serif" font-size="72" font-weight="900" fill="#f0e8d8" letter-spacing="-1">A Plan for</text>
  <text x="60" y="290" font-family="Georgia, serif" font-size="72" font-weight="900" font-style="italic" fill="#b87320" letter-spacing="-1">Our Family</text>

  <!-- Subtitle / dek -->
  <text x="60" y="360" font-family="Georgia, serif" font-size="20" fill="#b8a98a" font-style="italic">On adapting to an unexpected moment — and building</text>
  <text x="60" y="388" font-family="Georgia, serif" font-size="20" fill="#b8a98a" font-style="italic">something better from it.</text>

  <!-- Bottom rule -->
  <rect x="60" y="450" width="440" height="1" fill="#f0e8d8" opacity="0.15"/>

  <!-- Bottom label -->
  <text x="60" y="475" font-family="Georgia, serif" font-size="13" fill="#7a726a" letter-spacing="3">FOR KRIS, TOM AND JEANNE</text>

  <!-- Decorative compass rose - bottom right -->
  <g transform="translate(1090, 510)" opacity="0.15" stroke="#f0e8d8" stroke-width="1.5" fill="none">
    <circle r="40"/>
    <circle r="28"/>
    <line x1="0" y1="-40" x2="0" y2="40"/>
    <line x1="-40" y1="0" x2="40" y2="0"/>
    <line x1="-28" y1="-28" x2="28" y2="28"/>
    <line x1="28" y1="-28" x2="-28" y2="28"/>
    <!-- North arrow -->
    <polygon points="0,-40 -5,-20 5,-20" fill="#b87320" opacity="2" stroke="none"/>
    <text x="0" y="-46" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#b87320" opacity="5" stroke="none">N</text>
  </g>

  <!-- Right border accent -->
  <rect x="1194" y="0" width="6" height="630" fill="url(#amberGrad)" opacity="0.3"/>

</svg>
